spring:
  application:
    name: recipe-platform-backend

  # 프로젝트 루트의 .env 파일을 로드 (없어도 무시)
  config:
    import: optional:file:./.env[.properties],optional:file:../.env[.properties]

  # H2 파일 DB (기본). MariaDB로 바꾸려면 환경변수만 설정하면 됨.
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/recipe;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

server:
  port: 8082

# Gemini AI
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}

# JWT — 운영에서는 JWT_SECRET 환경변수를 반드시 설정하세요. 미설정 시 dev에선 임시 키 생성, prod에선 기동 실패.
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.recipeplatform: DEBUG
