services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: recipe
      MARIADB_USER: recipe
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    # 호스트 외부 노출 불필요 — 앱 컨테이너만 내부 네트워크로 접근
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mariadb://db:3306/recipe
      DB_USERNAME: recipe
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DRIVER: org.mariadb.jdbc.Driver
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (32+ bytes random)}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-604800000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      H2_CONSOLE_ENABLED: "false"
    ports:
      - "8082:8082"

volumes:
  db_data:
